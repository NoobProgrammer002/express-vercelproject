<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AttendX — Login</title>
  <link rel="stylesheet" href="login.css">
  <!-- Same fonts as the scanner page -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Dynamic background (same as scanner page) -->
  <div class="bg-canvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="bg-grid"></div>
  </div>

  <!-- Your original structure — IDs and classes unchanged -->
  <div class="main_parent">

    <div class="logo">Attend<span>X</span></div>
    <h2 id="text">Welcome Back</h2>

    <form id="form">
      <input type="text" placeholder="Username" id="username">
      <input type="password" placeholder="Password" id="password">
      <button type="submit" id="submit">Login</button>
    </form>

  </div>

  <script src="./login.js"></script>
</body>
</html>
